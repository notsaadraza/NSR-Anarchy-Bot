name: Corona_Virus

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *' # Har 15 minute baad check karega
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Plugins
        run: |
          npm install mineflayer mineflayer-pvp mineflayer-pathfinder mineflayer-auto-eat mineflayer-armor-manager
          pip install javascript

      - name: Run Bot
        run: python bot.py
